silverfish:
  spawn-chance: 0.9
  potion:
    drop-chance: 0.9
    duration: 4000
    level-lambda: 2.5

night-mobs:
  check-interval: 40
  light-threshold: 7
  spawn-radius: 48
  rock-exclusion-factor: 2.0
  ghast:
    chance: 0.3
    max-per-player: 3
  cave-spider:
    chance: 0.5
    max-per-player: 5

darkness:
  threshold: 5
  duration: 40
  check-interval: 10

world-gen:
  min-height: 40
  max-height: 80
  noise:
    octaves: 3
    frequency: 0.0025
    lacunarity: 2.0
    persistence: 0.5
    warp-strength: 32.0

  rocks:
    cell-size: 200
    radius: 30
    shell-thickness: 8
    spawn-chance: 0.75
    deform-strength: 4.0
    deform-scale: 0.08
    embed-factor: 0.2

    shell-clay-weights:
      regular: 0.75
      red: 0.05
      orange: 0.15
      pink: 0.02
      black: 0.03

    type-chances:
      oasis: 0.3
      ore-cave: 0.7
      # village gets the remainder

    oasis:
      pool-radius: 0.20
      pool-depth: 3
      glowstone-density: 0.05
      ceiling-glowstone-chance: 0.08
      ceiling-vine-chance: 0.08
      vine-min-length: 2
      vine-max-length: 7
      slope-rise: 7
      dirt-layers: 1
      floor-noise-scale: 0.03
      floor-noise-amplitude: 2
      pond-boundary-amplitude: 1
      clay-radius: 0.5
      decoration-density: 0.5
      decoration-weights:
        tall-grass: 0.35
        fern: 0.10
        jungle-sapling: 0.05
        dandelion: 0.12
        blue-orchid: 0.08
        poppy: 0.10
        allium: 0.08
        azure-bluet: 0.07
        oxeye-daisy: 0.05

    ore-cave:
      ore-weights:
        coal: 0.30
        iron: 0.25
        redstone: 0.15
        gold: 0.10
        lapis: 0.10
        diamond: 0.05
        emerald: 0.05
      densities:
        coal: 0.25
        iron: 0.20
        redstone: 0.18
        gold: 0.15
        lapis: 0.12
        diamond: 0.10
        emerald: 0.08
